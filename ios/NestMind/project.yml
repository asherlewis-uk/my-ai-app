name: NestMind
options:
  minimumXcodeGenVersion: 2.39.0
configs:
  Debug: debug
  Release: release
packages:
  supabase-swift:
    url: https://github.com/supabase/supabase-swift.git
    from: 2.0.0
targets:
  NestMind:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    resources:
      - path: Resources
        excludes:
          - Info.plist
          - NestMind.entitlements
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    dependencies:
      - package: supabase-swift
        product: Supabase
    settings:
      base:
        PRODUCT_NAME: NestMind
        PRODUCT_BUNDLE_IDENTIFIER: com.example.nestmind
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/NestMind.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        TARGETED_DEVICE_FAMILY: 1
        SWIFT_VERSION: 5.10
        GENERATE_INFOPLIST_FILE: NO
        DEVELOPMENT_ASSET_PATHS: "\"Resources\""
    scheme:
      testTargets:
        - NestMindTests
  NestMindTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/NestMindTests
    dependencies:
      - target: NestMind

